<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slideshow Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f19;
  color: white;
  overflow: hidden;
}

/* Top control bar */
#controls {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  padding: 10px 15px;
  border-radius: 12px;
  display: flex;
  gap: 10px;
  z-index: 10;
}

input, button, select {
  padding: 8px;
  border-radius: 6px;
  border: none;
}

/* Slideshow container */
#slideshow {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* Image base style */
#slideshow img {
  max-width: 95%;
  max-height: 95%;
  position: absolute;
  opacity: 0;
  transition: all 0.8s ease;
}

/* Transitions */
.fade {
  opacity: 1 !important;
}

.zoom {
  transform: scale(1.1);
  opacity: 1 !important;
}

.slide-left {
  transform: translateX(0);
  opacity: 1 !important;
}

/* default hidden state */
.hidden {
  opacity: 0;
  transform: scale(0.95);
}
</style>
</head>

<body>

<div id="controls">
  <input id="folderPath" placeholder="/slideshow-photos">

  <select id="duration">
    <option value="2000">2 sec</option>
    <option value="3000" selected>3 sec</option>
    <option value="5000">5 sec</option>
    <option value="8000">8 sec</option>
  </select>

  <button onclick="load()">Start</button>
  <button onclick="toggleFullscreen()">Fullscreen</button>
</div>

<div id="slideshow"></div>

<script>
let images = [];
let index = 0;
let timer;

// Preload images
function preload(urls) {
  urls.forEach(src => {
    const img = new Image();
    img.src = src;
  });
}

// Random transition generator
function randomClass() {
  const effects = ["fade", "zoom", "slide-left"];
  return effects[Math.floor(Math.random() * effects.length)];
}

async function load() {
  const path = document.getElementById("folderPath").value;

  const res = await fetch(`/api/dropbox?path=${encodeURIComponent(path)}`);
  images = await res.json();

  if (!images.length) {
    alert("No images found");
    return;
  }

  preload(images);
  index = 0;
  show();
  start();
}

function show() {
  const container = document.getElementById("slideshow");

  const effect = randomClass();

  container.innerHTML = `
    <img src="${images[index]}" class="hidden ${effect}">
  `;

  setTimeout(() => {
    document.querySelector("img").classList.remove("hidden");
  }, 50);
}

function next() {
  index = (index + 1) % images.length;
  show();
}

function start() {
  clearInterval(timer);

  const duration = document.getElementById("duration").value;

  timer = setInterval(next, Number(duration));
}

// Fullscreen
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// Keyboard controls
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") next();
  if (e.key === "f") toggleFullscreen();
});
</script>

</body>
</html>
