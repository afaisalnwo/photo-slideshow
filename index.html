<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Optimized Smart Slideshow</title>

<style>
    body {
        margin: 0;
        background: #000;
        overflow: hidden;
        font-family: Arial, sans-serif;
        color: white;
    }

    #viewer {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        background: black;
    }

    img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        position: absolute;
        opacity: 0;
        transition: opacity 0.6s ease-in-out, transform 0.6s ease-in-out;
        transform: scale(1);
    }

    .active {
        opacity: 1;
        transform: scale(1);
    }

    .zoom {
        transform: scale(1.05);
    }

    #controls {
        position: fixed;
        bottom: 15px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(20,20,20,0.7);
        padding: 10px 14px;
        border-radius: 10px;
        display: flex;
        gap: 10px;
        align-items: center;
        backdrop-filter: blur(10px);
    }

    input, button, select {
        padding: 6px;
        border-radius: 6px;
        border: none;
    }

    button {
        cursor: pointer;
    }

    #tvModeBtn {
        background: #ff3b3b;
        color: white;
    }

    #controls.hidden {
        display: none;
    }
</style>
</head>

<body>

<div id="viewer"></div>

<div id="controls">
    <input type="text" id="folderPath" value="/photo-slideshow" />

    <label>Speed</label>
    <select id="duration">
        <option value="3000">3 sec</option>
        <option value="4000">4 sec</option>
        <option value="5000">5 sec</option>
        <option value="7000">7 sec</option>
        <option value="10000">10 sec</option>
        <option value="15000">15 sec</option>
        <option value="20000">20 sec</option>
    </select>

    <button onclick="startSlideshow()">Start</button>
    <button onclick="toggleTV()" id="tvModeBtn">TV Mode</button>
</div>

<script>
let images = [];
let cache = {};
let currentIndex = 0;
let timer;

let preloadAhead = 2;
const MAX_CACHE = 6;

const viewer = document.getElementById("viewer");
let imgEl = null;

async function loadImages(folder) {
    try {
        const res = await fetch(folder + "/index.json");
        images = await res.json();
        images.sort();
    } catch (e) {
        console.error("Failed to load images", e);
    }
}

function preloadImage(i) {
    if (!images.length) return;

    i = i % images.length;

    if (!cache[i]) {
        const img = new Image();
        img.decoding = "async";
        img.loading = "eager";
        img.src = images[i];
        cache[i] = img;
    }

    const keys = Object.keys(cache);
    if (keys.length > MAX_CACHE) {
        delete cache[keys[0]];
    }
}

function renderImage(index) {
    if (!imgEl) {
        imgEl = document.createElement("img");
        viewer.appendChild(imgEl);
    }

    imgEl.classList.remove("active", "zoom");
    void imgEl.offsetWidth;

    const src = cache[index]?.src || images[index];
    imgEl.src = src;

    imgEl.onload = () => {
        imgEl.classList.add("active");
        if (Math.random() > 0.5) imgEl.classList.add("zoom");
    };

    for (let i = 1; i <= preloadAhead; i++) {
        preloadImage(index + i);
    }
}

function nextImage() {
    currentIndex = (currentIndex + 1) % images.length;
    renderImage(currentIndex);
}

async function startSlideshow() {
    const folder = document.getElementById("folderPath").value;
    const duration = parseInt(document.getElementById("duration").value);

    await loadImages(folder);

    currentIndex = 0;
    renderImage(currentIndex);

    clearInterval(timer);
    timer = setInterval(nextImage, duration);
}

function toggleTV() {
    const controls = document.getElementById("controls");

    if (document.fullscreenElement) {
        document.exitFullscreen();
        controls.classList.remove("hidden");
    } else {
        document.documentElement.requestFullscreen();
        controls.classList.add("hidden");
    }
}

document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") nextImage();
    if (e.key === "Escape") toggleTV();
});
</script>

</body>
</html>
