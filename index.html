<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fullscreen Slideshow</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
}

#topbar {
  position: fixed;
  top: 10px;
  width: 100%;
  z-index: 10;
}

input, button {
  padding: 10px;
  margin: 5px;
}

#slideshow {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

/* Frame styles */
.frame-classic img {
  border: 15px solid brown;
}

.frame-polaroid img {
  background: white;
  padding: 10px 10px 40px;
}

.frame-modern img {
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(255,255,255,0.5);
}
</style>
</head>

<body>

<div id="topbar">
  <input id="folderPath" placeholder="/photo-slideshow">
  
  <select id="frame">
    <option value="">No Frame</option>
    <option value="frame-classic">Classic</option>
    <option value="frame-polaroid">Polaroid</option>
    <option value="frame-modern">Modern</option>
  </select>

  <button onclick="loadImages()">Start Slideshow</button>
  <button onclick="toggleFullscreen()">Fullscreen</button>
</div>

<div id="slideshow">
  <p>Enter folder and start</p>
</div>

<script>
let images = [];
let index = 0;
let interval;

async function loadImages() {
  const path = document.getElementById("folderPath").value;

  const res = await fetch(`/api/dropbox?path=${encodeURIComponent(path)}`);
  images = await res.json();

  if (!images.length) {
    alert("No images found");
    return;
  }

  index = 0;
  show();
  startAuto();
}

function show() {
  const frame = document.getElementById("frame").value;
  const div = document.getElementById("slideshow");

  div.className = frame;
  div.innerHTML = `<img src="${images[index]}">`;
}

function next() {
  index = (index + 1) % images.length;
  show();
}

function prev() {
  index = (index - 1 + images.length) % images.length;
  show();
}

function startAuto() {
  clearInterval(interval);
  interval = setInterval(next, 3000);
}

// Fullscreen toggle
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// Keyboard controls
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") next();
  if (e.key === "ArrowLeft") prev();
  if (e.key === "f") toggleFullscreen();
});
</script>

</body>
</html>
