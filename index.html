<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slideshow Pro</title>

<style>
body {
  margin: 0;
  background: #05070f;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
}

/* =======================
   CONTROL BAR (MODERN UI)
======================= */
#controls {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  padding: 12px 14px;
  border-radius: 14px;

  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);

  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  z-index: 10;
}

input, select, button {
  border: none;
  border-radius: 8px;
  padding: 8px 10px;
  outline: none;
  font-size: 14px;
}

button {
  background: #2d6cff;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #1f55d6;
}

/* =======================
   SLIDESHOW CONTAINER
======================= */
#slideshow {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

/* Base image */
.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: contain;
  opacity: 0;
  transform: scale(1);
  transition: opacity 1.2s ease;
}

/* Active image */
.show {
  opacity: 1;
}

/* =======================
   KEN BURNS EFFECTS
======================= */

/* slow zoom + pan variations */
@keyframes zoomPan1 {
  0%   { transform: scale(1.05) translate(0, 0); }
  100% { transform: scale(1.25) translate(-30px, -20px); }
}

@keyframes zoomPan2 {
  0%   { transform: scale(1.1) translate(0, 0); }
  100% { transform: scale(1.3) translate(25px, -30px); }
}

@keyframes zoomPan3 {
  0%   { transform: scale(1.05) translate(0, 0); }
  100% { transform: scale(1.28) translate(-20px, 25px); }
}

@keyframes zoomPan4 {
  0%   { transform: scale(1.1) translate(0, 0); }
  100% { transform: scale(1.35) translate(30px, 20px); }
}

.kenburns1 { animation: zoomPan1 10s ease-in-out forwards; }
.kenburns2 { animation: zoomPan2 10s ease-in-out forwards; }
.kenburns3 { animation: zoomPan3 10s ease-in-out forwards; }
.kenburns4 { animation: zoomPan4 10s ease-in-out forwards; }

</style>
</head>

<body>

<div id="controls">
  <input id="folderPath" value="/photo-slideshow">

  <select id="duration">
    <option value="2000">2s</option>
    <option value="3000" selected>3s</option>
    <option value="5000">5s</option>
    <option value="8000">8s</option>
  </select>

  <button onclick="load()">Start</button>
  <button onclick="toggleFullscreen()">Fullscreen</button>
  <button onclick="tvMode()">TV Mode</button>
</div>

<div id="slideshow"></div>

<script>
let images = [];
let index = 0;
let timer;

function randomKenBurns() {
  const effects = ["kenburns1", "kenburns2", "kenburns3", "kenburns4"];
  return effects[Math.floor(Math.random() * effects.length)];
}

function preload(urls) {
  urls.forEach(src => {
    const img = new Image();
    img.src = src;
  });
}

async function load() {
  const path = document.getElementById("folderPath").value;

  const res = await fetch(`/api/dropbox?path=${encodeURIComponent(path)}`);
  images = await res.json();

  if (!images.length) {
    alert("No images found");
    return;
  }

  preload(images);

  index = 0;
  show();
  start();
}

function show() {
  const container = document.getElementById("slideshow");

  const src = images[index];
  const ken = randomKenBurns();

  const img = document.createElement("img");
  img.src = src;
  img.className = `slide ${ken}`;

  container.appendChild(img);

  // trigger fade-in
  setTimeout(() => {
    img.classList.add("show");
  }, 50);

  // cleanup old slides
  if (container.children.length > 2) {
    container.removeChild(container.firstChild);
  }
}

function next() {
  index = (index + 1) % images.length;
  show();
}

function start() {
  clearInterval(timer);

  const duration = Number(document.getElementById("duration").value);
  timer = setInterval(next, duration);
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

/* TV MODE */
function tvMode() {
  toggleFullscreen();
  document.getElementById("controls").style.opacity = "0";
  document.getElementById("controls").style.pointerEvents = "none";
}

/* keyboard */
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") next();
  if (e.key === "f") toggleFullscreen();
  if (e.key === "t") tvMode();
});
</script>

</body>
</html>
