<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slideshow Pro</title>

<style>
body {
  margin: 0;
  background: #05070f;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
}

/* =========================
   CONTROL BAR
========================= */
#controls {
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  padding: 12px 14px;
  border-radius: 14px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);

  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  z-index: 10;

  transition: opacity 0.8s ease;
}

/* 👇 AUTO HIDE STATE */
.hide-controls {
  opacity: 0;
  pointer-events: none;
}

input, select, button {
  border: none;
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 14px;
  outline: none;
}

button {
  background: #2d6cff;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #1f55d6;
}

/* =========================
   SLIDESHOW
========================= */
#slideshow {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
  background: black;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: contain;
  opacity: 0;
  transition: opacity 1.2s ease;
}

.show {
  opacity: 1;
}

/* =========================
   KEN BURNS
========================= */
@keyframes kb1 {
  0% { transform: scale(1.05) translate(0,0); }
  100% { transform: scale(1.25) translate(-30px,-20px); }
}
@keyframes kb2 {
  0% { transform: scale(1.1) translate(0,0); }
  100% { transform: scale(1.3) translate(25px,-25px); }
}
@keyframes kb3 {
  0% { transform: scale(1.05) translate(0,0); }
  100% { transform: scale(1.28) translate(-20px,25px); }
}
@keyframes kb4 {
  0% { transform: scale(1.08) translate(0,0); }
  100% { transform: scale(1.35) translate(30px,20px); }
}

.ken1 { animation: kb1 10s ease-in-out forwards; }
.ken2 { animation: kb2 10s ease-in-out forwards; }
.ken3 { animation: kb3 10s ease-in-out forwards; }
.ken4 { animation: kb4 10s ease-in-out forwards; }

</style>
</head>

<body>

<!-- =========================
     CONTROLS
========================= -->
<div id="controls">

  <input id="folderPath" value="/photo-slideshow">

  <select id="duration">
    <option value="3000" selected>3s</option>
    <option value="5000">5s</option>
    <option value="8000">8s</option>
    <option value="12000">12s</option>
  </select>

  <!-- MUSIC -->
  <select id="music">
    <option value="">No Music</option>

    <option value="https://feeds.soundcloud.com/stream/1145820199-unminus-5-stages-of-you-free-lo-fi-music.mp3">
      5 Stages of You
    </option>

    <option value="https://feeds.soundcloud.com/stream/1159581277-unminus-open-minded.mp3">
      Open Minded
    </option>

    <option value="https://feeds.soundcloud.com/stream/1459173025-unminus-night-melody.mp3">
      Night Melody
    </option>
  </select>

  <input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">

  <button onclick="load()">Start</button>
  <button onclick="toggleFullscreen()">Fullscreen</button>
  <button onclick="toggleMusic()">Music</button>
  <button onclick="tvMode()">TV Mode</button>

</div>

<div id="slideshow"></div>

<script>
let images = [];
let index = 0;
let timer;

/* =========================
   MUSIC
========================= */
let audio = new Audio();
audio.loop = true;
audio.volume = 0.5;

function loadMusic() {
  const url = document.getElementById("music").value;
  if (!url) {
    audio.pause();
    return;
  }
  audio.src = url;
  audio.load();
}

async function toggleMusic() {
  const url = document.getElementById("music").value;
  if (!url) return;

  if (!audio.src) loadMusic();

  try {
    if (audio.paused) await audio.play();
    else audio.pause();
  } catch (e) {
    console.log(e);
  }
}

document.getElementById("volume").addEventListener("input", e => {
  audio.volume = e.target.value;
});

/* =========================
   AUTO HIDE CONTROLS
========================= */
let hideTimer;

function showControls() {
  document.getElementById("controls").classList.remove("hide-controls");
  resetHideTimer();
}

function hideControls() {
  document.getElementById("controls").classList.add("hide-controls");
}

function resetHideTimer() {
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => {
    hideControls();
  }, 4000);
}

/* activity listeners */
document.addEventListener("mousemove", showControls);
document.addEventListener("keydown", showControls);
document.addEventListener("touchstart", showControls);

/* =========================
   SLIDESHOW
========================= */
function preload(urls) {
  urls.forEach(src => {
    const img = new Image();
    img.src = src;
  });
}

function randomKen() {
  const arr = ["ken1","ken2","ken3","ken4"];
  return arr[Math.floor(Math.random()*arr.length)];
}

async function load() {
  const path = document.getElementById("folderPath").value;

  const res = await fetch(`/api/dropbox?path=${encodeURIComponent(path)}`);
  images = await res.json();

  if (!images.length) {
    alert("No images found");
    return;
  }

  preload(images);

  const musicUrl = document.getElementById("music").value;
  if (musicUrl) {
    audio.src = musicUrl;
    audio.play().catch(()=>{});
  }

  index = 0;
  show();
  start();

  showControls();
}

function show() {
  const container = document.getElementById("slideshow");

  const img = document.createElement("img");
  img.src = images[index];
  img.className = `slide ${randomKen()}`;

  container.appendChild(img);

  setTimeout(() => img.classList.add("show"), 50);

  if (container.children.length > 2) {
    container.removeChild(container.firstChild);
  }
}

function next() {
  index = (index + 1) % images.length;
  show();
}

function start() {
  clearInterval(timer);

  const d = Number(document.getElementById("duration").value);
  timer = setInterval(next, d);

  resetHideTimer();
}

/* =========================
   FULLSCREEN / TV MODE
========================= */
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

function tvMode() {
  toggleFullscreen();
  document.getElementById("controls").classList.add("hide-controls");
}

/* keyboard */
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") next();
  if (e.key === "f") toggleFullscreen();
  if (e.key === "t") tvMode();
});
</script>

</body>
</html>
